<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Brasileirão Série B 2026</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="shortcut icon" href="image/logo-serie-b.png" type="image/x-icon">
</head>
<body>

    <div class="ctitle">
        <div class="ititle">
            <img src="image/logo-serie-b.png" alt="Logo Brasileirão" id="logo-brasileirao">
        </div>
        <div class="ntitle">
            <h1>TABELA BRASILEIRÃO SÉRIE B</h1>
            <h1>2026</h1>
        </div>
    </div>

    <!-- CONTAINER PRINCIPAL -->
    <div class="main-container">

        <!-- TABELA -->
        <div class="table-container">
            <table>
                <thead>
                    <tr id="titulos">
                        <th>CLASSIFICAÇÃO</th>
                        <th>P</th>
                        <th>J</th>
                        <th>V</th>
                        <th>E</th>
                        <th>D</th>
                        <th>GP</th>
                        <th>GC</th>
                        <th>SG</th>
                        <th>%</th>
                        <th>Últimos 5</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- LATERAL DIREITA (RODADA) -->
        <div class="rodadas-container">

    <div class="rodada-header">
        <button onclick="trocarRodada(-1)">
            <i class="bi bi-chevron-left"></i>
        </button>

        <h2 id="tituloRodada">Rodada 1</h2>

        <button onclick="trocarRodada(1)">
            <i class="bi bi-chevron-right"></i>
        </button>
    </div>

    <div id="listaJogos"></div>

</div>

    <div id="listaJogos"></div>
</div>

    </div>

    <!-- ÁUDIO -->
    <audio id="clickSound" preload="auto">
        <source src="audio/fortnite-mouse-button-click-(battle-royale)-made-with-Voicemod.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
